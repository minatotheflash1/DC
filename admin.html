<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Premium System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0b0f19;
            --bg-panel: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #8A2BE2;
            --secondary: #00FFCC;
            --text-main: #ffffff;
            --text-muted: #888888;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #ffa502;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

        /* Utility Classes */
        .hidden { display: none !important; }
        .flex { display: flex; }
        
        /* ================= LOGIN SECTION ================= */
        #login-section { height: 100vh; display: flex; justify-content: center; align-items: center; background-image: radial-gradient(circle at top right, rgba(138,43,226,0.1), transparent 40%), radial-gradient(circle at bottom left, rgba(0,255,204,0.1), transparent 40%); }
        
        .login-box { background: var(--bg-panel); backdrop-filter: blur(15px); border: 1px solid var(--border-color); padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-box h2 { color: var(--secondary); margin-bottom: 25px; font-weight: 600; letter-spacing: 1px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); color: white; border-radius: 10px; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(138, 43, 226, 0.2); }
        
        .login-btn { width: 100%; padding: 14px; background: linear-gradient(45deg, var(--primary), var(--secondary)); border: none; border-radius: 10px; color: black; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0, 255, 204, 0.3); color: white; }

        /* ================= DASHBOARD LAYOUT ================= */
        #dashboard-section { height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--bg-panel); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px; }
        .sidebar-brand { font-size: 22px; font-weight: 600; color: var(--secondary); text-align: center; margin-bottom: 40px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        .nav-link { padding: 12px 15px; margin-bottom: 10px; border-radius: 8px; color: var(--text-muted); cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-link:hover, .nav-link.active { background: rgba(0, 255, 204, 0.1); color: var(--secondary); border-left: 3px solid var(--secondary); }
        .logout-btn { margin-top: auto; background: rgba(255, 71, 87, 0.1); color: var(--danger); text-align: center; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255, 71, 87, 0.2); }
        .logout-btn:hover { background: var(--danger); color: white; }

        /* Main Content */
        .main-content { flex: 1; padding: 30px 40px; overflow-y: auto; background-image: radial-gradient(circle at top right, rgba(0,255,204,0.03), transparent 50%); }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header-top h1 { font-size: 24px; font-weight: 500; }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--bg-panel); border: 1px solid var(--border-color); padding: 25px; border-radius: 15px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; }
        .stat-card.blue::before { background: #3742fa; }
        .stat-card.green::before { background: var(--success); }
        .stat-card.orange::before { background: var(--warning); }
        
        .stat-card p { color: var(--text-muted); font-size: 14px; margin-bottom: 10px; }
        .stat-card h2 { font-size: 32px; color: white; }

        /* Coupon Tool */
        .tools-card { background: var(--bg-panel); border: 1px solid var(--border-color); padding: 20px 25px; border-radius: 15px; margin-bottom: 40px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .tools-card h3 { font-size: 16px; color: var(--secondary); margin-right: auto; }
        .tools-input { padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(0,0,0,0.5); color: white; outline: none; width: 150px; }
        .tools-btn { padding: 10px 20px; background: var(--primary); border: none; color: white; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: 500; }
        .tools-btn:hover { background: #9b59b6; }

        /* Table Area */
        .table-container { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 15px; overflow: hidden; padding: 20px; }
        .table-container h3 { margin-bottom: 20px; font-size: 18px; color: white; }
        .table-responsive { width: 100%; overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        th { color: var(--text-muted); font-weight: 500; text-transform: uppercase; font-size: 12px; }
        tbody tr:hover { background: rgba(255,255,255,0.02); }

        /* Badges & Buttons */
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-block; }
        .badge.Pending { background: rgba(255, 165, 2, 0.1); color: var(--warning); border: 1px solid rgba(255, 165, 2, 0.3); }
        .badge.Approved { background: rgba(46, 213, 115, 0.1); color: var(--success); border: 1px solid rgba(46, 213, 115, 0.3); }
        .badge.Rejected { background: rgba(255, 71, 87, 0.1); color: var(--danger); border: 1px solid rgba(255, 71, 87, 0.3); }

        .action-btn { padding: 6px 15px; border-radius: 6px; font-size: 12px; border: none; cursor: pointer; transition: 0.2s; font-weight: 500; margin-right: 5px; }
        .btn-approve { background: var(--success); color: black; }
        .btn-approve:hover { filter: brightness(1.1); box-shadow: 0 0 10px rgba(46, 213, 115, 0.4); }
        .btn-reject { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .btn-reject:hover { background: var(--danger); color: white; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .stats-grid { grid-template-columns: 1fr; }
            .tools-card { flex-direction: column; align-items: stretch; }
            .tools-input { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- ================= LOGIN VIEW ================= -->
    <div id="login-section">
        <div class="login-box">
            <h2>Admin Portal</h2>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="admin@domain.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button class="login-btn" onclick="login()">Secure Login 🔒</button>
        </div>
    </div>

    <!-- ================= DASHBOARD VIEW ================= -->
    <div id="dashboard-section" class="hidden">
        
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-brand">
                ⚡ Premium Admin
            </div>
            <div class="nav-link active">📊 Dashboard</div>
            <div class="nav-link" onclick="fetchDashboardData()">🔄 Refresh Data</div>
            
            <div class="logout-btn" onclick="logout()">🚪 Logout</div>
        </div>

        <!-- Main Content Area -->
        <div class="main-content">
            <div class="header-top">
                <h1>Overview</h1>
                <p style="color: var(--text-muted);" id="current-date">Loading date...</p>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card blue">
                    <p>Total Students</p>
                    <h2 id="stat-students">0</h2>
                </div>
                <div class="stat-card green">
                    <p>Total Revenue</p>
                    <h2 id="stat-revenue">৳ 0</h2>
                </div>
                <div class="stat-card orange">
                    <p>Pending Requests</p>
                    <h2 id="stat-pending">0</h2>
                </div>
            </div>

            <!-- Tool: Generate Coupon -->
            <div class="tools-card">
                <h3>🎟️ Generate Promo Code</h3>
                <input type="number" id="coupon-percent" class="tools-input" placeholder="Discount % (e.g. 15)">
                <button class="tools-btn" onclick="createWebCoupon()">Create Coupon</button>
            </div>

            <!-- Data Table -->
            <div class="table-container">
                <h3>Recent Registrations</h3>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Student Info</th>
                                <th>Discord User</th>
                                <th>Payment Details</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- JS will inject rows here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script>
        const API_BASE = "http://127.0.0.1:5000/api";

        // Set Date
        document.getElementById('current-date').innerText = new Date().toDateString();

        // Check Session on Page Load
        if(sessionStorage.getItem("admin_logged_in") === "true") {
            showDashboard();
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_BASE}/admin/login`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const result = await res.json();

                if(result.success) {
                    sessionStorage.setItem("admin_logged_in", "true");
                    showDashboard();
                } else { alert("❌ Invalid Credentials!"); }
            } catch (e) { alert("Server Error! Ensure backend is running."); }
        }

        function logout() {
            sessionStorage.removeItem("admin_logged_in");
            document.getElementById('dashboard-section').classList.add('hidden');
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }

        function showDashboard() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');
            fetchDashboardData();
        }

        async function fetchDashboardData() {
            try {
                const res = await fetch(`${API_BASE}/admin/dashboard`);
                const result = await res.json();
                
                document.getElementById('stat-students').innerText = result.total_students;
                document.getElementById('stat-revenue').innerText = "৳ " + result.total_revenue.toLocaleString();
                
                let pendingCount = 0;
                let rows = '';
                
                result.data.forEach(user => {
                    if(user.status === 'Pending') pendingCount++;
                    
                    let actionButtons = user.status === 'Pending' ? `
                        <button class="action-btn btn-approve" onclick="updateStatus(${user.id}, 'Approved')">Approve</button>
                        <button class="action-btn btn-reject" onclick="updateStatus(${user.id}, 'Rejected')">Reject</button>
                    ` : `<span style="color:var(--text-muted); font-size:12px;">Processed</span>`;

                    rows += `
                    <tr>
                        <td>
                            <strong style="color: white;">${user.name}</strong><br>
                            <span style="color: var(--text-muted); font-size:12px;">${user.phone}</span>
                        </td>
                        <td><span style="background: rgba(88, 101, 242, 0.1); color: #5865F2; padding: 4px 8px; border-radius: 6px; font-size: 12px;">${user.discord_username}</span></td>
                        <td>
                            <strong style="color: var(--secondary);">${user.payment_method}</strong><br>
                            <span style="color: var(--text-muted); font-size:12px;">Num: ${user.sender_number}</span><br>
                            <span style="color: var(--text-muted); font-size:12px;">Trx: ${user.trx_id}</span>
                        </td>
                        <td style="color: white; font-weight: 500;">৳ ${user.amount}</td>
                        <td><span class="badge ${user.status}">${user.status}</span></td>
                        <td>${actionButtons}</td>
                    </tr>`;
                });
                
                document.getElementById('stat-pending').innerText = pendingCount;
                document.getElementById('table-body').innerHTML = rows;
            } catch (e) { console.error("Error loading dashboard data:", e); }
        }

        async function updateStatus(id, action) {
            if(!confirm(`Are you sure you want to ${action} this student?`)) return;
            
            try {
                await fetch(`${API_BASE}/admin/action`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id, action})
                });
                fetchDashboardData(); // Refresh table
            } catch (e) { alert("Action Failed!"); }
        }

        async function createWebCoupon() {
            const percent = document.getElementById('coupon-percent').value;
            if(!percent || percent <= 0 || percent > 100) return alert("Enter a valid percentage (1-100)!");

            try {
                const res = await fetch(`${API_BASE}/admin/create_coupon`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ discount: percent })
                });
                const result = await res.json();
                
                if(result.success) {
                    alert(`✅ Coupon Created Successfully!\n\nPromo Code: ${result.code}\nDiscount: ${percent}%`);
                    document.getElementById('coupon-percent').value = '';
                }
            } catch (e) { alert("Failed to create coupon."); }
        }
    </script>
</body>
</html>
